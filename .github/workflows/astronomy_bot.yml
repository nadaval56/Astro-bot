name: 🔭 שמי הלילה – בוט אסטרונומיה יומי

on:
  schedule:
    # ═══════════════════════════════════════════════════════
    # ריצה 1: כל יום 11:00 UTC = 13:00 ישראל (חורף) / 14:00 (קיץ)
    #   → שולח אם לא שבת/חג עכשיו ואין הדלקת נרות בשעה הקרובה
    # ריצה 2: כל יום 19:00 UTC = 21:00 ישראל
    #   → שולח אם לא נשלח היום ולא שבת/חג עכשיו
    # ═══════════════════════════════════════════════════════
    - cron: '0 11 * * *'   # כל יום 13:00 ישראל (חורף) / 14:00 (קיץ)
    - cron: '0 18 * * *'   # כל יום 21:00 ישראל (קיץ) / 20:00 (חורף)

  workflow_dispatch:
    inputs:
      test_mode:
        description: 'מצב בדיקה – מדפיס בלבד, לא שולח WhatsApp'
        required: false
        default: 'false'
      force_send:
        description: 'שלח גם אם כבר נשלח היום'
        required: false
        default: 'false'

jobs:
  send-astronomy-update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # נדרש לשמירת message_history.json

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 התקנת ספריות
        run: pip install -r requirements.txt

      - name: 🔭 הרצת בוט האסטרונומיה
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          GREEN_API_INSTANCE:  ${{ secrets.GREEN_API_INSTANCE }}
          GREEN_API_TOKEN:     ${{ secrets.GREEN_API_TOKEN }}
          WHATSAPP_GROUP_ID:   ${{ secrets.WHATSAPP_GROUP_ID }}
          TEST_MODE:           ${{ github.event.inputs.test_mode }}
          FORCE_SEND:          ${{ github.event.inputs.force_send }}
        run: python shamay_halayla.py

      - name: 💾 שמירת היסטוריית הודעות
        if: always()
        run: |
          git config user.name  "Astro Bot"
          git config user.email "astro-bot@shamay-halayla"
          [ -f message_history.json ] || echo "{}" > message_history.json
          git add message_history.json
          git diff --staged --quiet || git commit -m "📚 history: $(date '+%Y-%m-%d')"
          git push

      - name: 📊 שמירת לוג
        if: always()
        run: |
          echo "הרצה הסתיימה בשעה $(date '+%Y-%m-%d %H:%M:%S UTC')"
